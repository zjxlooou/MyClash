    path: './ruleset/cn_ip.mrs'
    path-in-bundle: 'geo/geoip/cn.mrs'

# --- 策略组 (Proxy Groups) ---

# 策略组通用配置
group_common:
  group_common_select:
    &group_common_select {
      type: select,
      interval: 600,
      timeout: 3000,
      max-failed-times: 3,
      empty-fallback: REJECT,
      url: 'https://g.cn/generate_204',
      lazy: true,
    }

  group_common_auto:
    &group_common_auto {
      type: url-test,
      interval: 600,
      timeout: 3000,
      max-failed-times: 3,
      empty-fallback: REJECT,
      url: 'https://g.cn/generate_204',
      lazy: true,
      tolerance: 50,
      include-all: true,
      exclude-type: 'DIRECT',
      icon: 'https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Auto.png',
      hidden: true,
    }

# 通用代理节点组
proxies_common:
  proxies_default:
    &proxies_default {
      proxies:
        [
          '默认代理',
          '自动选择',
          '香港',
          '日本',
          '美国',
          '新加坡',
          '台湾省',
          '低倍率节点',
          '高倍率节点',
          '其他节点',
        ],
    }

  proxies_direct:
    &proxies_direct {
      proxies:
        [
          '默认代理',
          '自动选择',
          '直连',
          '香港',
          '日本',
          '美国',
          '新加坡',
          '台湾省',
          '低倍率节点',
          '高倍率节点',
          '其他节点',
        ],
    }

  proxies_reject: &proxies_reject { proxies: ['REJECT', 'REJECT-DROP', 'PASS'] }

# 地区过滤器正则表达式定义
group_filter:
  HK_filter: &HK_filter { filter: '🇭🇰|港|HK|[Hh]ong\s*[Kk]ong' }
  JP_filter: &JP_filter { filter: '🇯🇵|日本|JP|[Jj]apan' }
  US_filter: &US_filter { filter: '🇺🇸|美|US|[Aa]merica|[Uu]nited\s*[Ss]tates' }
  SG_filter: &SG_filter { filter: '🇸🇬|新加坡|狮城|SG|[Ss]ingapore' }
  TW_filter: &TW_filter { filter: '🇹🇼|台湾|TW|[Tt]aiwan' }
  low_filter:
    &low_filter {
      filter: '^(?!.*(?:剩|期|客户端|软件)).*(?:(?<!\d)0\.[0-5]|下载|低倍)',
    }
  high_filter:
    &high_filter {
      filter: '(?u)(?:[*×xX✕✖⨉]\s*(?:[2-9]\d*|[1-9]\d+)(?:\.\d+)?)|(?:(?<![\d.])(?:[2-9]\d*|[1-9]\d+)(?:\.\d+)?\s*(?:倍|[*×xX✕✖⨉]))',
    }
  exclude_filter:
    &exclude_filter {
      exclude-filter: '港|HK|🇭🇰|日本|JP|🇯🇵|美|US|🇺🇸|新加坡|SG|🇸🇬|台湾|TW|🇹🇼',
      exclude-type: 'DIRECT',
    }

# 定义分流策略组
proxy-groups:
  - name: '默认代理'
    <<: *group_common_select
    proxies:
      [
        '香港',
        '日本',
        '美国',
        '新加坡',
        '台湾省',
        '低倍率节点',
        '高倍率节点',
        '自动选择',
        '其他节点',
      ]
    icon: 'https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Proxy.png'

  - name: '自动选择'
    <<: *group_common_auto

  - name: 'AI'
    <<: [*group_common_select, *proxies_default]
    default-selected: '美国'
    icon: 'https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/ChatGPT.png'

  - name: 'Telegram'
    <<: [*group_common_select, *proxies_default]
    icon: 'https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Telegram.png'

  - name: 'Steam'
    <<: [*group_common_select, *proxies_direct]
    icon: 'https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Steam.png'

  - name: '广告拦截'
    <<: [*group_common_select, *proxies_reject]
    icon: 'https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Advertising.png'

  - name: '直连'
    <<: *group_common_select
    proxies: ['🇨🇳 直连 | IPv4优先', '🇨🇳 直连 | IPv6优先', '🇨🇳 直连 | 双栈']
    url: 'https://connectivitycheck.platform.hicloud.com/generate_204'
    icon: 'https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/China_Map.png'

  - name: '漏网之鱼'
    <<: *group_common_select
    proxies: ['默认代理', '直连']
    icon: 'https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Stack.png'

  # 定义地区策略组
  - name: '香港'
    <<: [*group_common_select, *HK_filter]
    include-all: true
    proxies: ['香港-自动选择']
    icon: 'https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Hong_Kong.png'
  - name: '香港-自动选择'
    <<: [*group_common_auto, *HK_filter]

  - name: '日本'
    <<: [*group_common_select, *JP_filter]
    include-all: true
    proxies: ['日本-自动选择']
    icon: 'https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Japan.png'
  - name: '日本-自动选择'
    <<: [*group_common_auto, *JP_filter]

  - name: '美国'
    <<: [*group_common_select, *US_filter]
    include-all: true
    proxies: ['美国-自动选择']
    icon: 'https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/United_States.png'
  - name: '美国-自动选择'
    <<: [*group_common_auto, *US_filter]

  - name: '新加坡'
    <<: [*group_common_select, *SG_filter]
    include-all: true
    proxies: ['新加坡-自动选择']
    icon: 'https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Singapore.png'
  - name: '新加坡-自动选择'
    <<: [*group_common_auto, *SG_filter]

  - name: '台湾省'
    <<: [*group_common_select, *TW_filter]
    include-all: true
    proxies: ['台湾省-自动选择']
    icon: 'https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Taiwan.png'
  - name: '台湾省-自动选择'
    <<: [*group_common_auto, *TW_filter]

  - name: '低倍率节点'
    <<: [*group_common_select, *low_filter]
    include-all: true
    proxies: ['低倍率节点-自动选择']
    icon: 'https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Available_1.png'
  - name: '低倍率节点-自动选择'
    <<: [*group_common_auto, *low_filter]

  - name: '高倍率节点'
    <<: [*group_common_select, *high_filter]
    include-all: true
    proxies: ['高倍率节点-自动选择']
    icon: 'https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Airport.png'
  - name: '高倍率节点-自动选择'
    <<: [*group_common_auto, *high_filter]

  - name: '其他节点'
    <<: [*group_common_select, *exclude_filter]
    include-all: true
    proxies: ['其他节点-自动选择']
    icon: 'https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/World_Map.png'
  - name: '其他节点-自动选择'
    <<: [*group_common_auto, *exclude_filter]

# --- 路由规则 (Rules) ---

rules:
  # 禁用国外 QUIC 流量
  - AND,((NETWORK,UDP),(DST-PORT,443),(NOT,((OR,((RULE-SET,cn_additional),(RULE-SET,cn_ip,no-resolve)))))),REJECT

  # 私有网络直连
  - RULE-SET,private,直连
  - RULE-SET,private_ip,直连,no-resolve

  # 国内直连
  - RULE-SET,games_cn,直连 # 已包含 steam 下载域名
  - RULE-SET,epicgames,直连
  - RULE-SET,apple_cn,直连
  - RULE-SET,microsoft_cn,直连
  - DOMAIN,fsend.cn,直连
  - DOMAIN,international-gfe.download.nvidia.com,直连

  # 广告拦截
  - RULE-SET,adblockmihomolite,广告拦截

  # 代理规则
  - RULE-SET,ai,AI
  - RULE-SET,telegram,Telegram
  - RULE-SET,telegram_ip,Telegram,no-resolve

  # 兜底规则
  - RULE-SET,google,默认代理
  - RULE-SET,gfw,默认代理
  - RULE-SET,cn_additional,直连
  - RULE-SET,cn_ip,直连
  - MATCH,漏网之鱼
